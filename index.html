<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator Pitch</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "marked": "https://aistudiocdn.com/marked@^16.4.1"
  }
}
</script>
<script>
  // Enforce dark mode on initial load
  document.documentElement.classList.add('dark');
</script>
<style>
    /* Custom scrollbar styles for a more modern look */
    .custom-scrollbar::-webkit-scrollbar {
      height: 12px; /* Height of the horizontal scrollbar */
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #e5e7eb; /* gray-200 - A distinct but subtle track color for light mode */
    }
    
    .dark .custom-scrollbar::-webkit-scrollbar-track {
        background: #1e293b; /* slate-800 - A distinct but subtle track color for dark mode */
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #9ca3af; /* gray-400 */
      border-radius: 6px;
      border: 3px solid #e5e7eb; /* gray-200 - Creates padding, matches track */
    }
    
    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #475569; /* slate-600 */
        border-color: #1e293b; /* slate-800 - Creates padding, matches track */
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: #6b7280; /* gray-500 */
    }
    
    .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: #334155; /* slate-700 */
    }
    
    /* Animation keyframes */
    @keyframes fadeInScaleUp {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in-scale-up {
      animation: fadeInScaleUp 0.2s ease-out forwards;
    }
    
    @keyframes fadeOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.95); }
    }
    .animate-fade-out {
        animation: fadeOut 0.3s ease-out forwards;
    }
    
    @keyframes highlight {
        0% { background-color: transparent; }
        50% { background-color: rgba(59, 130, 246, 0.2); transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        100% { background-color: transparent; transform: scale(1); }
    }
    .animate-highlight {
        animation: highlight 0.7s ease-in-out;
    }

</style>
</head>
  <body class="bg-gray-50 dark:bg-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
