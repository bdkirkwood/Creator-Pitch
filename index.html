<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",

  }
}
</script>
<script>
  // Immediately apply the theme on initial load
  (function() {
    const theme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (theme === 'dark' || (theme === null && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
<style>
    /* Custom scrollbar styles for a more modern look */
    .custom-scrollbar::-webkit-scrollbar {
      height: 12px; /* Height of the horizontal scrollbar */
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #e5e7eb; /* gray-200 - A distinct but subtle track color for light mode */
    }
    
    .dark .custom-scrollbar::-webkit-scrollbar-track {
        background: #1e293b; /* slate-800 - A distinct but subtle track color for dark mode */
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #9ca3af; /* gray-400 */
      border-radius: 6px;
      border: 3px solid #e5e7eb; /* gray-200 - Creates padding, matches track */
    }
    
    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #475569; /* slate-600 */
        border-color: #1e293b; /* slate-800 - Creates padding, matches track */
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: #6b7280; /* gray-500 */
    }
    
    .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: #334155; /* slate-700 */
    }
</style>
</head>
  <body class="bg-gray-50 dark:bg-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
